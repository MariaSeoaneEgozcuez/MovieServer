services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - movieserver-network

  api-gateway:
    image: api-gateway
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      NODE_CONFIG: '{"services":{"stats":{"url":"http://stats-service:3005"}}}'
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - movieserver-network

  auth-service:
    image: auth-service
    environment:
      NODE_ENV: production
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - movieserver-network

  bbdd-service:
    image: bbdd-service
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: production
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - movieserver-network

  stats-service:
    image: stats-service
    ports:
      - "3005:3005"
    environment:
      NODE_ENV: production
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - movieserver-network

  query-service:
    image: query-service
    environment:
      NODE_ENV: production
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - movieserver-network

  llm-service:
    image: llm-service
    environment:
      NODE_ENV: production
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - movieserver-network

  telegram-service:
    image: telegram-service
    environment:
      NODE_ENV: production
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      TELEGRAM_BOT_TOKEN: 8712582890:AAGRHuEV4T8iAb3LZSEyKjKADm6Ncsl7e9c
      TELEGRAM_WELCOME_CHAT_ID: CineServerBot
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - movieserver-network

networks:
  movieserver-network:
    driver: overlay