services:
  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - auth-service
      - query-service
      - bbdd-service
      - llm-service
      - stats-service
    networks:
      - movieserver-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Otros servicios aquí...

networks:
  movieserver-network:
    driver: bridge